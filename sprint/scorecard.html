.score-high{border-color:var(--green);color:var(--green);background:#f0fdf4}

    reporting:  { critical: { t: 'Demasiado tiempo en reportes', d: 'Si el reporting toma 1+ hora/persona/semana, es tiempo productivo quemado.' }, good: null },
    tools:      { critical: { t: 'Proliferaci\u00f3n de herramientas fragmenta al equipo', d: 'Cambiar de contexto entre muchas herramientas mata el trabajo profundo.' }, good: null },
    incidents:  { critical: { t: 'Respuesta a incidentes sin estructura', d: 'El manejo ad-hoc significa ca\u00eddas m\u00e1s largas. Los workflows automatizados reducen el tiempo 40\u201360%.' }, good: null },
    documents:  { critical: { t: 'El procesamiento de documentos consume horas', d: 'La entrada manual de facturas es lenta y propensa a errores. La extracci\u00f3n con IA automatiza 80%+.' }, good: null },
    comms:      { critical: { t: 'La herramienta de comunicaci\u00f3n necesita estructura', d: 'Sin canales organizados, las conversaciones se dispersan.' }, good: null }
  }
};

// State
var lang = 'en';
var current = 0;
var answers = [];
var companyType = null;
var activeQuestions = [];

function detectLang() {
  var params = new URLSearchParams(window.location.search);
  var p = params.get('lang');
  if (p && LANGS[p]) return p;
  var nav = (navigator.language || '').slice(0, 2).toLowerCase();
  if (LANGS[nav]) return nav;
  return 'en';
}

function setLang(l) {
  lang = l;
  current = 0;
  answers = [];
  companyType = null;
  activeQuestions = [];
  var t = LANGS[lang];
  document.getElementById('badge-text').textContent = t.badge;
  document.getElementById('hero-title').textContent = t.heroTitle;
  document.getElementById('hero-sub').textContent = t.heroSub;
  document.getElementById('nav-sprint').textContent = t.navSprint;
  document.documentElement.lang = lang;
  document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.lang === lang); });
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').textContent = '';
  document.getElementById('hero').style.display = '';
  document.getElementById('quiz').style.display = '';
  buildQuestions();
  render();
}

function buildQuestions() {
  var base = Q_BASE[lang] || Q_BASE.en;
  activeQuestions = [base.size, base.comms];
  if (companyType === 'startup') {
    var sq = Q_STARTUP[lang] || Q_STARTUP.en;
    sq.forEach(function(q) { activeQuestions.push(q); });
  } else if (companyType === 'smb') {
    var mq = Q_SMB[lang] || Q_SMB.en;
    mq.forEach(function(q) { activeQuestions.push(q); });
  } else {
    // placeholder until type is selected
    var dq = Q_STARTUP[lang] || Q_STARTUP.en;
    dq.forEach(function(q) { activeQuestions.push(q); });
  }
  activeQuestions.push(base.teamSize);
}

function createEl(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === 'className') el.className = attrs[k];
    else if (k === 'textContent') el.textContent = attrs[k];
    else if (k.indexOf('on') === 0) el.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else el.setAttribute(k, attrs[k]);
  });
  if (children) children.forEach(function(c) { if (c) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  return el;
}

function render() {
  var t = LANGS[lang];
  var q = activeQuestions[current];
  document.getElementById('progress-label').textContent = t.qOf.replace('{n}', current + 1).replace('{t}', activeQuestions.length);
  document.getElementById('progress').style.width = ((current + 1) / activeQuestions.length * 100) + '%';
  var old = document.querySelector('.question-card');
  if (old) old.remove();

  var optionsDiv = createEl('div', { className: 'options' });
  q.options.forEach(function(opt, i) {
    var dot = createEl('div', { className: 'option-dot' });
    if (answers[current] === i) {
      dot.appendChild(createEl('div', { style: 'width:8px;height:8px;background:#fff;border-radius:50%' }));
    }
    var optEl = createEl('div', { className: 'option' + (answers[current] === i ? ' selected' : ''), onClick: function() { selectOption(i); } }, [
      dot, createEl('span', { textContent: opt.text })
    ]);
    optionsDiv.appendChild(optEl);
  });

  var btnRow = createEl('div', { className: 'btn-row' });
  if (current > 0) btnRow.appendChild(createEl('button', { className: 'btn btn-back', textContent: t.back, onClick: goBack }));
  else btnRow.appendChild(createEl('div'));
  var nextBtn = createEl('button', { className: 'btn btn-next', textContent: current === activeQuestions.length - 1 ? t.seeResults : t.next, onClick: goNext, id: 'nextBtn' });
  if (answers[current] === undefined) nextBtn.disabled = true;
  btnRow.appendChild(nextBtn);

  var card = createEl('div', { className: 'question-card active' }, [
    createEl('h2', { textContent: q.q }),
    createEl('p', { className: 'context', textContent: q.context }),
    optionsDiv, btnRow
  ]);
  document.getElementById('quiz').appendChild(card);
}

function selectOption(index) {
  answers[current] = index;
  // If first question (company type), rebuild questions
  if (current === 0) {
    var opt = activeQuestions[0].options[index];
    if (opt.type && opt.type !== companyType) {
      companyType = opt.type;
      var savedAnswers = answers.slice();
      buildQuestions();
      answers = savedAnswers;
    }
  }
  render();
}

function goBack() { if (current > 0) { current--; render(); } }

function goNext() {
  if (answers[current] === undefined) return;
  if (current < activeQuestions.length - 1) { current++; render(); }
  else showResults();
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('hero').style.display = 'none';
  var t = LANGS[lang];
  var fd = FINDINGS[lang] || FINDINGS.en;

  var totalScore = 0, teamSize = 55, categoryScores = {};
  answers.forEach(function(ansIdx, qIdx) {
    var q = activeQuestions[qIdx];
    var opt = q.options[ansIdx];
    if (q.category) { totalScore += opt.score; categoryScores[q.category] = opt.score; }
    if (opt.team) teamSize = opt.team;
  });

  var scoredCount = Object.keys(categoryScores).length;
  var maxScore = scoredCount * 3;
  var pct = maxScore > 0 ? Math.round(totalScore / maxScore * 100) : 50;
  var inefficiency = maxScore > 0 ? (maxScore - totalScore) / maxScore : 0.5;
  var hoursLost = Math.round(teamSize * inefficiency * 2.5);

  var scoreClass, verdict, detail;
  if (pct >= 70) { scoreClass = 'score-high'; verdict = t.verdictHigh; detail = t.detailHigh; }
  else if (pct >= 40) { scoreClass = 'score-mid'; verdict = t.verdictMid; detail = t.detailMid; }
  else { scoreClass = 'score-low'; verdict = t.verdictLow; detail = t.detailLow; }

  var findings = [];
  Object.keys(categoryScores).forEach(function(cat) {
    if (!fd[cat]) return;
    if (categoryScores[cat] <= 1 && fd[cat].critical) findings.push({ sev: categoryScores[cat] === 0 ? 'critical' : 'warning', title: fd[cat].critical.t, desc: fd[cat].critical.d });
    else if (categoryScores[cat] >= 3 && fd[cat].good) findings.push({ sev: 'good', title: fd[cat].good.t, desc: fd[cat].good.d });
  });
  if (findings.length === 0) findings.push({ sev: 'good', title: 'Solid workflows', desc: 'No major issues detected.' });

  var r = document.getElementById('results');
  r.style.display = 'block';
  r.textContent = '';

  r.appendChild(createEl('div', { style: 'text-align:center;margin-bottom:32px' }, [
    createEl('h1', { style: 'font-size:32px;margin-bottom:16px', textContent: t.resultsTitle }),
    createEl('div', { className: 'score-circle ' + scoreClass }, [
      createEl('div', { className: 'score-num', textContent: String(pct) }),
      createEl('div', { className: 'score-label', textContent: verdict })
    ]),
    createEl('p', { style: 'color:var(--muted);font-size:16px;max-width:500px;margin:0 auto', textContent: detail })
  ]));

  r.appendChild(createEl('div', { className: 'time-saved' }, [
    createEl('div', { className: 'big', textContent: t.hoursWeek.replace('{h}', hoursLost) }),
    createEl('p', { textContent: t.hoursDesc.replace('{s}', teamSize) })
  ]));

  var fSection = createEl('div', { style: 'margin:32px 0' }, [
    createEl('h3', { style: 'font-size:18px;font-weight:700;margin-bottom:16px', textContent: t.findings })
  ]);
  findings.forEach(function(f) {
    fSection.appendChild(createEl('div', { className: 'finding ' + f.sev }, [
      createEl('h4', { textContent: f.title }), createEl('p', { textContent: f.desc })
    ]));
  });
  r.appendChild(fSection);

  var ms = encodeURIComponent(t.mailSubject.replace('{p}', pct));
  var mb = encodeURIComponent(t.mailBody.replace('{p}', pct).replace('{s}', teamSize).replace('{h}', hoursLost));
  r.appendChild(createEl('div', { className: 'cta-box' }, [
    createEl('h3', { textContent: t.ctaTitle }),
    createEl('p', { textContent: t.ctaSub }),
    createEl('a', { href: 'mailto:eg@techconcepts.org?subject=' + ms + '&body=' + mb, textContent: t.ctaBtn })
  ]));

  var su = encodeURIComponent('https://techconcepts.org/sprint/scorecard.html?lang=' + lang);
  r.appendChild(createEl('div', { className: 'share-row' }, [
    createEl('a', { href: 'https://www.linkedin.com/sharing/share-offsite/?url=' + su, target: '_blank', textContent: t.shareLinkedIn }),
    createEl('a', { href: 'mailto:?subject=Workflow%20Scorecard&body=' + su, target: '_blank', textContent: t.shareEmail })
  ]));
  r.appendChild(createEl('div', { style: 'text-align:center;margin-top:32px' }, [
    createEl('a', { href: '/sprint/', style: 'color:var(--accent);font-weight:600;font-size:15px', textContent: t.learnMore })
  ]));

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
lang = detectLang();
var langBar = document.getElementById('lang-bar');
[['en', 'English'], ['de', 'Deutsch'], ['fr', 'Fran\u00e7ais'], ['es', 'Espa\u00f1ol']].forEach(function(item) {
  var btn = createEl('button', { className: 'lang-btn' + (item[0] === lang ? ' active' : ''), textContent: item[1], 'data-lang': item[0], onClick: function() { setLang(item[0]); } });
  langBar.appendChild(btn);
});
var initT = LANGS[lang];
document.getElementById('badge-text').textContent = initT.badge;
document.getElementById('hero-title').textContent = initT.heroTitle;
document.getElementById('hero-sub').textContent = initT.heroSub;
document.getElementById('nav-sprint').textContent = initT.navSprint;
document.documentElement.lang = lang;
buildQuestions();
render();
</script>
</body>
</html>
